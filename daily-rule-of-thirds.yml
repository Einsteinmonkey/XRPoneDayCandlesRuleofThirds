name: Daily XRP Rule of Thirds

on:
  workflow_dispatch:
  schedule:
    # Binance daily candles close at 00:00 UTC.
    # This runs at 00:17 UTC to avoid the busiest GitHub Actions minute and to make sure the candle is closed.
    - cron: "17 0 * * *"

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calculate XRP/USDT Rule of Thirds
        run: python calculate_rule_of_thirds.py --symbol XRPUSDT --interval 1d

      - name: Commit updated results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update XRP/USDT rule of thirds"
          file_pattern: "results/latest.md results/history.csv"
